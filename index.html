<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch Thi Đấu World Cup 2026</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>LỊCH THI ĐẤU WORLD CUP 2026</h1>
        <p>Lịch thi đấu vòng bảng</p>
      </div>
    </header>

    <main class="container">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="all">Tất cả trận</button>
        <button class="tab-btn" data-tab="upcoming">Sắp diễn ra</button>
        <button class="tab-btn" data-tab="finished">Kết quả</button>
        <button class="tab-btn" data-tab="favorites">⭐ Yêu thích</button>
      </div>

      <div class="filter-wrapper">
        <div class="filter-controls">
          <input
            type="text"
            id="search-input"
            placeholder="Tìm kiếm quốc gia..."
          />

          <select id="group-select">
            <option value="all">Tất cả bảng</option>
            <option value="A">Bảng A</option>
            <option value="B">Bảng B</option>
            <option value="C">Bảng C</option>
            <option value="D">Bảng D</option>
            <option value="E">Bảng E</option>
            <option value="F">Bảng F</option>
            <option value="G">Bảng G</option>
            <option value="H">Bảng H</option>
            <option value="I">Bảng I</option>
            <option value="J">Bảng J (Messi)</option>
            <option value="K">Bảng K (Ronaldo)</option>
            <option value="L">Bảng L</option>
          </select>

          <select id="sort-select">
            <option value="time">Theo thời gian</option>
            <option value="group">Theo bảng đấu</option>
            <option value="team">Tên đội A-Z</option>
          </select>
        </div>

        <div class="date-filters">
          <button class="date-btn active" data-date="all">Tất cả</button>
          <button class="date-btn" data-date="today">Hôm nay</button>
          <button class="date-btn" data-date="tomorrow">Ngày mai</button>
        </div>
      </div>

      <div id="match-list" class="match-grid"></div>
    </main>

    <!-- Modal -->
    <div id="match-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">×</span>
        <div id="modal-body"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
