<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch Thi Đấu World Cup 2026 - Knockout</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <div class="logo">
            <span class="trophy">🏆</span>
            <div>
              <h1>World Cup 2026</h1>
              <p class="subtitle">Vòng Knockout</p>
            </div>
          </div>

          <div class="controls">
            <div
              id="roleBadge"
              style="
                font-size: 11px;
                font-weight: 800;
                padding: 6px 12px;
                border-radius: 6px;
                display: none;
              "
            ></div>

            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                id="searchInput"
                type="text"
                placeholder="Tìm đội tuyển..."
                onkeyup="filterMatches()"
              />
            </div>

            <div class="date-filter">
              <i class="fa-solid fa-calendar"></i>
              <select id="dateFilter" onchange="filterMatches()">
                <option value="">Tất cả ngày</option>
              </select>
            </div>

            <button onclick="showFavorites()" class="fav-btn">
              <i class="fa-solid fa-heart"></i>
              <span id="favCount">0</span>
            </button>
          </div>
        </div>

        <div id="tabs" class="tabs"></div>
      </header>

      <main>
        <div id="matchesContainer" class="matches-grid"></div>
      </main>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div id="modalMatchInfo" class="modal-match-info"></div>
          <button onclick="closeModal()" class="close-btn">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">
          <div id="modalTeams" class="modal-teams"></div>
          <div class="modal-info">
            <div id="modalTime" class="modal-time"></div>
            <div id="modalDate" class="modal-date"></div>
            <div id="modalVenue" class="modal-venue"></div>
          </div>
        </div>
        <div class="modal-footer"></div>
      </div>
    </div>

    <div id="toast" class="toast">
      <i class="fa-solid fa-circle-check"></i>
      <span id="toastText"></span>
    </div>

    <script src="script.js"></script>
  </body>
</html>
